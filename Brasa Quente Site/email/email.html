<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email | Brasa Quente</title>
  <link rel="icon" href="../tela-de-login/img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BOTÃO VOLTAR --> 
  <nav class="nav-top">
    <a href="../tela-inicial/index.html">← Voltar</a>
  </nav>

  <!-- FUNDO COM OVERLAY -->
  <div class="bg-overlay"></div>

  <!-- CONTAINER LOGIN -->
  <div class="login-container">

    <div class="login-box">

      <!-- LOGO -->
      <img src="./img/Logo Churrascaria Restaurante  (2).png" class="logo">

      <h2>Bem-vindo</h2>
      <p class="sub">Esqueceu sua senha?</p>

      <form onsubmit="login(event)">

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="seu_email@email.com" required>
        </div>

      
        <button type="submit">Avançar</button>

      </form>

     

    </div>

  </div>
  <script src="script-email.js"></script>
</body>
</html>
