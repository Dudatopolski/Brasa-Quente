<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha| Brasa Quente</title>
  <link rel="icon" href="../tela-de-login/img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BOTÃO VOLTAR -->
  <nav class="nav-top">
    <a href="../tela-inicial/index.html">← Voltar</a>
  </nav>

  <!-- FUNDO COM OVERLAY -->
  <div class="bg-overlay"></div>

  <!-- CONTAINER LOGIN -->
  <div class="login-container">

    <div class="login-box">

      <!-- LOGO -->
      <img src="../email/img/Logo Churrascaria Restaurante  (2).png" class="logo">

      <h2>Bem-vindo</h2>
      <p class="sub">Digite sua nova senha</p>

      <form onsubmit="login(event)">

        <div class="input-group">
          <label>Senha</label>
          <input type="password" placeholder="Digite sua nova senha" required>
        </div>

        <div class="input-group">
          <label>Confirmar Senha</label>
          <input type="password" placeholder="Digite novamente" required>
        </div>

        <button type="submit">Avançar</button>

      </form>

     

    </div>

  </div>
  <script src="script-senha.js"></script>
</body>
</html>
