<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Brasa Quente</title>
  <link rel="icon" href="./img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BOTÃO VOLTAR -->
  <nav class="nav-top">
    <a href="../tela-inicial/index.html">← Voltar</a>
  </nav>

  <!-- FUNDO COM OVERLAY -->
  <div class="bg-overlay"></div>

  <!-- CONTAINER LOGIN -->
  <div class="login-container">

    <div class="login-box">

      <!-- LOGO -->
      <img src="./img/logo.png" class="logo">

      <h2>Bem-vindo</h2>
      <p class="sub">Acesse sua conta</p>

      <form onsubmit="login(event)">

        <div class="input-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="seu_email@email.com" required>
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input id="password" type="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit">Entrar</button>

      </form>

      <div class="links">
        <a href="../tela-de-cadastro/cadastro.html">Criar conta</a>
        <a href="../email/email.html">Esqueci a senha</a>
      </div>

    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
